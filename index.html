<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ملوكتي ❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #500b14;
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* خلفية القلوب المتحركة */
        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: rgba(255, 75, 110, 0.6);
            animation: floatUp 6s linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-105vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* الحاوية الرئيسية */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            text-align: center;
        }

        .page {
            display: none;
            background: rgba(80, 11, 20, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.4);
        }

        .page.active {
            display: block;
        }

        /* تصميم الصفحة الأولى (شكل القلب الكبير) */
        .heart-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 40px auto 60px auto;
        }

        .main-heart {
            width: 100%;
            height: 100%;
            background-color: #b31e34;
            position: absolute;
            transform: rotate(-45deg);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .main-heart:before, .main-heart:after {
            content: "";
            width: 100%;
            height: 100%;
            background-color: #b31e34;
            border-radius: 50%;
            position: absolute;
        }

        .main-heart:before { top: -50%; left: 0; }
        .main-heart:after { left: 50%; top: 0; }

        .heart-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .heart-content h1 {
            font-size: 32px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .heart-content p {
            font-size: 16px;
            color: rgba(255,255,255,0.9);
            font-weight: 500;
        }

        .input-group {
            margin-top: 20px;
            text-align: right;
            width: 85%;
            margin-left: auto;
            margin-right: auto;
        }

        .password-label {
            font-size: 14px;
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            padding-right: 15px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 50px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }

        input[type="password"]:focus {
            border-color: #ff4b6e;
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 10px rgba(255, 75, 110, 0.5);
        }

        .btn {
            background: #731222;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 85%;
        }

        .btn:hover {
            background: #941c30;
            transform: scale(1.03);
        }

        /* الصفحة الثانية */
        .text-box {
            min-height: 120px;
            font-size: 20px;
            line-height: 1.8;
            margin-bottom: 30px;
            font-weight: 500;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .typing::after {
            content: "|";
            animation: blink 0.7s infinite;
            color: #ff4b6e;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .audio-player {
            background: #3a060d;
            border-radius: 20px;
            padding: 15px;
            margin-top: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-title {
            font-size: 14px;
            margin-bottom: 12px;
            color: #ffb3bd;
            font-weight: bold;
        }

        /* الصفحة الثالثة */
        .timer-header {
            font-size: 18px;
            margin-bottom: 20px;
            color: #ffb3bd;
            line-height: 1.6;
            font-weight: bold;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 5px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .timer-num {
            font-size: 20px;
            font-weight: bold;
            color: #ff4b6e;
        }

        .timer-label {
            font-size: 11px;
            opacity: 0.8;
            margin-top: 5px;
        }

        .gallery {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .photo-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .photo-card img {
            width: 100%;
            border-radius: 15px;
            object-fit: cover;
            max-height: 450px;
            display: block;
        }

        .photo-desc {
            margin-top: 12px;
            font-size: 16px;
            color: #ffb3bd;
            line-height: 1.6;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsContainer"></div>

    <div class="container">
        
        <div class="page active" id="page1">
            <div class="heart-wrapper">
                <div class="main-heart"></div>
                <div class="heart-content">
                    <h1>love</h1>
                    <p>❤️ my soulmate</p>
                </div>
            </div>
            <div class="input-group">
                <label class="password-label">Password</label>
                <input type="password" id="passwordInput" placeholder="password">
            </div>
            <button class="btn" onclick="checkPassword()">💕 Unlock 💕</button>
        </div>

        <div class="page" id="page2">
            <div style="font-size: 35px; margin-bottom: 15px;">😍</div>
            <div class="text-box" id="typingText"></div>
            
            <button class="btn" onclick="goToPage3()">💕 next 💕</button>

            <div class="audio-player">
                <div class="player-title">🎵 حبيبي أغلى من عمري - عمرو دياب</div>
                <div style="width: 100%; border-radius: 12px; overflow: hidden;">
                    <iframe width="100%" height="120" scrolling="no" frameborder="no" allow="autoplay" 
                        src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/276550341&color=%23ff4b6e&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false">
                    </iframe>
                </div>
            </div>
        </div>

        <div class="page" id="page3">
            <div class="timer-header">💕 أول مره شوفتك فيها في 21/9/2021 💕</div>
            
            <div class="timer-grid">
                <div class="timer-box">
                    <div class="timer-num" id="days">00</div>
                    <div class="timer-label">يوم</div>
                </div>
                <div class="timer-box">
                    <div class="timer-num" id="hours">00</div>
                    <div class="timer-label">ساعة</div>
                </div>
                <div class="timer-box">
                    <div class="timer-num" id="minutes">00</div>
                    <div class="timer-label">دقيقة</div>
                </div>
                <div class="timer-box">
                    <div class="timer-num" id="seconds">00</div>
                    <div class="timer-label">ثانية</div>
                </div>
            </div>

            <div style="font-size: 15px; margin-bottom: 20px; font-weight: 500;">كل ثانية بتعدي وانت في قلبي ❤️</div>

            <hr style="border: 0; height: 1px; background: rgba(255,255,255,0.2); margin: 20px 0;">

            <div class="gallery">
                <div class="photo-card">
                    <img src="https://images.weserv.nl/?url=https://raw.githubusercontent.com/42zfn8ckr8-eng/love-sitee/main/image-15.png" alt="ملوكتي">
                    <div class="photo-desc">بحبك ❤️</div>
                </div>
                <div class="photo-card">
                    <img src="https://images.weserv.nl/?url=https://raw.githubusercontent.com/42zfn8ckr8-eng/love-sitee/main/image-16.png" alt="ملوكتي">
                    <div class="photo-desc">إنتي دنيتي كلها وكل حاجة ليا وبإذن الله هنكمل سوا للأخر</div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 1. توليد القلوب المتحركة
        const heartsContainer = document.getElementById('heartsContainer');
        const heartSymbols = ['❤️', '💖', '💕', '💗', '💘'];
        
        setInterval(() => {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's'; 
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
            heartsContainer.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 7000);
        }, 300);

        // 2. الباسوورد
        function checkPassword() {
            const pass = document.getElementById('passwordInput').value;
            if(pass === 'malak') {
                document.getElementById('page1').classList.remove('active');
                document.getElementById('page2').classList.add('active');
                startTypingEffect();
            } else {
                alert('الباسوورد غلط يا بطل.. فكر تاني! 😉');
            }
        }

        // 3. تأثير الكتابة حرف حرف
        const loveMessage = "ربنا يخليكي ليا يا ملوكتي انا مقدرش على زعلك و عملتلك الموقع ده ليكي عشان انا بحبك اوي ❤️🥰";
        function startTypingEffect() {
            const textBox = document.getElementById('typingText');
            textBox.innerHTML = ""; 
            textBox.classList.add('typing');
            let i = 0;
            
            function type() {
                if (i < loveMessage.length) {
                    textBox.innerHTML += loveMessage.charAt(i);
                    i++;
                    setTimeout(type, 30); 
                } else {
                    textBox.classList.remove('typing');
                }
            }
            type();
        }

        // 4. الانتقال للتايمر والصور
        function goToPage3() {
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page3').classList.add('active');
            startTimer();
        }

        // 5. عداد الوقت من 21/9/2021
        function startTimer() {
            const startDate = new Date('2021-09-21T00:00:00');

            setInterval(() => {
                const now = new Date();
                const difference = now - startDate;

                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = days;
                document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
                document.getElementById('minutes').innerText = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById('seconds').innerText = seconds < 10 ? '0' + seconds : seconds;
            }, 1000);
        }
    </script>
</body>
</html>
