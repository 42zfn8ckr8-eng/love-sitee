<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Love</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow-x:hidden;
text-align:center;
}

.container{
padding:20px;
}

h1{
font-size:40px;
margin-top:20px;
color:#ff4d6d;
}

p{
margin-top:10px;
font-size:20px;
color:#ddd;
}

.gallery{
display:flex;
flex-direction:column;
gap:20px;
margin-top:30px;
align-items:center;
}

.gallery img{
width:90%;
max-width:400px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.timer{
margin-top:40px;
font-size:28px;
color:#ffccd5;
}

.hearts{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
color:red;
animation:float 6s linear infinite;
font-size:25px;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

audio{
margin-top:30px;
width:90%;
}

</style>
</head>

<body>

<div class="container">

<h1>❤️ My Love ❤️</h1>

<p>
You are the best thing in my life
</p>

<div class="gallery">

<img src="images/IMG_5214.png">

<img src="images/a1fa4a49-88db-4da3-bff6-44dff65382a9.jpeg">

</div>

<div class="timer" id="loveTimer">
Loading...
</div>

<audio controls autoplay loop>
<source src="music/song.mp3" type="audio/mp3">
</audio>

</div>

<div class="hearts"></div>

<script>

const startDate = new Date("2024-01-01");

function updateTimer(){

const now = new Date();

const difference = now - startDate;

const days = Math.floor(difference / (1000*60*60*24));

const hours = Math.floor(
(difference % (1000*60*60*24)) / (1000*60*60)
);

const minutes = Math.floor(
(difference % (1000*60*60)) / (1000*60)
);

const seconds = Math.floor(
(difference % (1000*60)) / 1000
);

document.getElementById("loveTimer").innerHTML =
days + " Days ❤️ " +
hours + " Hours ❤️ " +
minutes + " Minutes ❤️ " +
seconds + " Seconds";

}

setInterval(updateTimer,1000);

updateTimer();

const heartsContainer = document.querySelector(".hearts");

function createHeart(){

const heart = document.createElement("div");

heart.classList.add("heart");

heart.innerHTML = "❤️";

heart.style.left = Math.random() * 100 + "vw";

heart.style.fontSize =
Math.random() * 20 + 20 + "px";

heart.style.animationDuration =
Math.random() * 3 + 3 + "s";

heartsContainer.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
