<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ملوكتي ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background:
                radial-gradient(circle at top, #7a1023 0%, #32040b 45%, #120104 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hearts-bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: rgba(255, 95, 130, 0.7);
            animation: floatUp linear infinite;
            bottom: -50px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 20px;
        }

        .page {
            display: none;
            animation: fade .6s ease;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(14px);
            border-radius: 30px;
            padding: 30px;
            box-shadow:
                0 10px 40px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(255, 70, 110, 0.08);
        }

        .page.active {
            display: block;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heart-wrapper {
            position: relative;
            width: 270px;
            height: 270px;
            margin: 40px auto 70px;
        }

        .main-heart {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #ff335f, #9e102c);
            position: absolute;
            transform: rotate(-45deg);
            border-radius: 25px;
            box-shadow:
                0 0 50px rgba(255, 50, 100, 0.4),
                0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .main-heart::before,
        .main-heart::after {
            content: "";
            width: 100%;
            height: 100%;
            position: absolute;
            background: linear-gradient(145deg, #ff335f, #9e102c);
            border-radius: 50%;
        }

        .main-heart::before {
            top: -50%;
        }

        .main-heart::after {
            left: 50%;
        }

        .heart-content {
            position: absolute;
            inset: 0;
            z-index: 5;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .heart-content h1 {
            font-size: 36px;
            letter-spacing: 2px;
        }

        .heart-content p {
            margin-top: 10px;
            font-size: 18px;
            opacity: .95;
        }

        .input-group {
            width: 90%;
            margin: auto;
            text-align: right;
        }

        .password-label {
            margin-bottom: 10px;
            display: block;
            padding-right: 12px;
            opacity: .85;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 16px;
            outline: none;
            transition: .3s;
            text-align: center;
        }

        input:focus {
            border-color: #ff4d7b;
            box-shadow: 0 0 20px rgba(255, 70, 120, 0.3);
        }

        .btn {
            width: 90%;
            padding: 15px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(145deg, #ff3f69, #99152d);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: .3s;
            box-shadow: 0 10px 20px rgba(0, 0, 0, .25);
        }

        .btn:hover {
            transform: scale(1.03);
        }

        .text-box {
            min-height: 140px;
            font-size: 23px;
            line-height: 2;
            margin-bottom: 35px;
            font-weight: 500;
        }

        .typing::after {
            content: "|";
            animation: blink .7s infinite;
            color: #ff5a7e;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .audio-player {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 18px;
        }

        .player-title {
            margin-bottom: 12px;
            color: #ffb4c4;
            font-size: 15px;
            font-weight: bold;
        }

        audio {
            width: 100%;
        }

        .timer-header {
            font-size: 20px;
            margin-bottom: 25px;
            line-height: 1.8;
            color: #ffb3c5;
            font-weight: bold;
        }

        .timer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 14px 5px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .timer-num {
            font-size: 22px;
            color: #ff5b82;
            font-weight: bold;
        }

        .timer-label {
            margin-top: 5px;
            font-size: 12px;
            opacity: .8;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 25px;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transition: .4s;
        }

        .photo-card img {
            width: 100%;
            border-radius: 18px;
            display: block;
            object-fit: cover;
            max-height: 500px;
        }

        .photo-desc {
            margin-top: 15px;
            font-size: 17px;
            line-height: 1.7;
            color: #ffc4d1;
            font-weight: 500;
        }

        .love-line {
            margin-top: 15px;
            font-size: 16px;
            color: #ffd7e0;
        }
    </style>
</head>

<body>

    <div class="hearts-bg" id="heartsContainer"></div>

    <div class="container">

        <div class="page active" id="page1">

            <div class="heart-wrapper">
                <div class="main-heart"></div>

                <div class="heart-content">
                    <h1>LOVE</h1>
                    <p>❤️ my soulmate ❤️</p>
                </div>
            </div>

            <div class="input-group">
                <label class="password-label">Password</label>

                <input type="password"
                    id="passwordInput"
                    placeholder="password">
            </div>

            <button class="btn" onclick="checkPassword()">
                💕 Unlock 💕
            </button>

        </div>

        <div class="page" id="page2">

            <div style="font-size:40px; margin-bottom:20px;">
                😍
            </div>

            <div class="text-box" id="typingText"></div>

            <button class="btn" onclick="goToPage3()">
                💕 next 💕
            </button>

            <!-- الأغنية -->
            <div class="audio-player">

                <div class="player-title">
                    🎵 حبيبي أغلى من عمري - عمرو دياب
                </div>

                <audio controls autoplay loop id="bgMusic">

                    <source src="music/song.mp3.mp3" type="audio/mpeg">

                    متصفحك لا يدعم تشغيل الصوت.

                </audio>

            </div>

        </div>

        <div class="page" id="page3">

            <div class="timer-header">
                💕 أول مرة شوفتك فيها كانت أجمل صدفة في حياتي ❤️
            </div>

            <div class="timer-grid">

                <div class="timer-box">
                    <div class="timer-num" id="days">00</div>
                    <div class="timer-label">يوم</div>
                </div>

                <div class="timer-box">
                    <div class="timer-num" id="hours">00</div>
                    <div class="timer-label">ساعة</div>
                </div>

                <div class="timer-box">
                    <div class="timer-num" id="minutes">00</div>
                    <div class="timer-label">دقيقة</div>
                </div>

                <div class="timer-box">
                    <div class="timer-num" id="seconds">00</div>
                    <div class="timer-label">ثانية</div>
                </div>

            </div>

            <div class="love-line">
                كل ثانية بتعدي وانتي في قلبي ❤️
            </div>

            <div class="gallery">

                <div class="photo-card">
                    <img src="images/IMG_5214.png">

                    <div class="photo-desc">
                        بحبك اوي ❤️
                    </div>
                </div>

                <div class="photo-card">
                    <img src="images/a1fa4a49-88db-4da3-bff6-44dff65382a9.jpeg">

                    <div class="photo-desc">
                        انتي اجمل حاجة حصلتلي 💕
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script>

        const heartsContainer =
            document.getElementById('heartsContainer');

        const heartSymbols =
            ['❤️', '💖', '💕', '💗', '💘'];

        setInterval(() => {

            const heart =
                document.createElement('div');

            heart.classList.add('heart');

            heart.innerText =
                heartSymbols[Math.floor(Math.random() * heartSymbols.length)];

            heart.style.left =
                Math.random() * 100 + 'vw';

            heart.style.fontSize =
                (Math.random() * 15 + 15) + 'px';

            heart.style.animationDuration =
                (Math.random() * 3 + 4) + 's';

            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);

        }, 300);


        function checkPassword() {

            const pass =
                document.getElementById('passwordInput').value;

            if (pass === 'malak') {

                document.getElementById('page1')
                    .classList.remove('active');

                document.getElementById('page2')
                    .classList.add('active');

                startTypingEffect();

                const audio =
                    document.getElementById('bgMusic');

                audio.volume = 0.7;

                audio.play().then(() => {

                    console.log("music started");

                }).catch(() => {

                    console.log("autoplay blocked");

                });

            } else {

                alert('الباسوورد غلط 😉');

            }
        }


        const loveMessage =
            "ربنا يخليكي ليا يا ملوكتي ❤️ انا مقدرش على زعلك ابداً وعملتلك الموقع ده عشان تعرفي قد ايه انا بحبك 🥹💕";

        function startTypingEffect() {

            const textBox =
                document.getElementById('typingText');

            textBox.innerHTML = "";

            textBox.classList.add('typing');

            let i = 0;

            function type() {

                if (i < loveMessage.length) {

                    textBox.innerHTML +=
                        loveMessage.charAt(i);

                    i++;

                    setTimeout(type, 40);

                } else {

                    textBox.classList.remove('typing');

                }
            }

            type();
        }


        function goToPage3() {

            document.getElementById('page2')
                .classList.remove('active');

            document.getElementById('page3')
                .classList.add('active');

            startTimer();
        }


        function startTimer() {

            const startDate =
                new Date('2021-09-21T00:00:00');

            setInterval(() => {

                const now = new Date();

                const difference =
                    now - startDate;

                const days =
                    Math.floor(difference / (1000 * 60 * 60 * 24));

                const hours =
                    Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

                const minutes =
                    Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));

                const seconds =
                    Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = days;

                document.getElementById('hours').innerText =
                    hours < 10 ? '0' + hours : hours;

                document.getElementById('minutes').innerText =
                    minutes < 10 ? '0' + minutes : minutes;

                document.getElementById('seconds').innerText =
                    seconds < 10 ? '0' + seconds : seconds;

            }, 1000);
        }

    </script>

</body>

</html>
